<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Internal Field — シンクロニシティ・マネジメント</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&display=swap');

  :root {
    --bg: #f8f9fc;
    --surface: #ffffff;
    --surface2: #f0f2f8;
    --accent: #1d9bf0;
    --accent2: #7856ff;
    --accent3: #e8368f;
    --text: #1a1a2e;
    --text-sub: #5a6578;
    --border: #dfe3ec;
    --gradient1: linear-gradient(135deg, #1d9bf0, #7856ff);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans JP', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.8;
    min-height: 100vh;
  }

  .hero {
    position: relative;
    padding: 100px 24px 80px;
    text-align: center;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 800px 500px at 30% 30%, rgba(29,155,240,0.1), transparent),
      radial-gradient(ellipse 600px 400px at 70% 70%, rgba(120,86,255,0.07), transparent);
  }
  .hero-content { position: relative; z-index: 1; max-width: 700px; margin: 0 auto; }
  .hero-icon {
    font-size: 3rem;
    margin-bottom: 20px;
    display: block;
  }
  .hero h1 {
    font-size: clamp(1.8rem, 4vw, 2.8rem);
    font-weight: 900;
    background: var(--gradient1);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 12px;
  }
  .hero p {
    color: var(--text-sub);
    font-size: 1.1rem;
    font-weight: 300;
  }

  .container {
    max-width: 800px;
    margin: 0 auto;
    padding: 0 24px 80px;
  }

  .section-title {
    font-size: 0.85rem;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 20px;
    font-weight: 700;
  }

  .report-card {
    display: flex;
    gap: 20px;
    align-items: flex-start;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 16px;
    text-decoration: none;
    color: var(--text);
    transition: all 0.2s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  }
  .report-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    border-color: var(--accent);
  }
  .report-icon {
    width: 56px; height: 56px;
    background: var(--gradient1);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.5rem;
    flex-shrink: 0;
  }
  .report-info { flex: 1; }
  .report-title {
    font-size: 1.15rem;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .report-desc {
    color: var(--text-sub);
    font-size: 0.9rem;
    margin-bottom: 8px;
  }
  .report-meta {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }
  .meta-tag {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 0.75rem;
    font-weight: 500;
  }
  .meta-date { background: rgba(29,155,240,0.1); color: #0c7cd5; }
  .meta-cat { background: rgba(120,86,255,0.1); color: #6040d4; }
  .meta-status { background: rgba(0,166,125,0.1); color: #008060; }

  .empty-state {
    text-align: center;
    padding: 60px 24px;
    color: var(--text-sub);
  }

  .footer {
    text-align: center;
    padding: 40px 24px;
    color: var(--text-sub);
    font-size: 0.8rem;
    border-top: 1px solid var(--border);
    background: var(--surface2);
  }

  @media (max-width: 640px) {
    .report-card { flex-direction: column; gap: 12px; }
  }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-content">
    <span class="hero-icon">🏠</span>
    <h1>Internal Field</h1>
    <p>社内ナレッジポータル — 戦略・リサーチ・ノウハウの蓄積基地</p>
  </div>
</div>

<div class="container">
  <div class="section-title">📄 Reports</div>

  <a href="reports/x-global-growth-strategy-2026.html" class="report-card">
    <div class="report-icon">𝕏</div>
    <div class="report-info">
      <div class="report-title">世界中の人が集まるXアカウント構築戦略 2026</div>
      <div class="report-desc">最新アルゴリズム・成長戦略・マネタイズを完全網羅。90日アクションプラン付き。</div>
      <div class="report-meta">
        <span class="meta-tag meta-date">2026-05-12</span>
        <span class="meta-tag meta-cat">SNS戦略</span>
        <span class="meta-tag meta-status">NEW</span>
      </div>
    </div>
  </a>

</div>

<div class="footer">
  <p>Internal Field — 株式会社シンクロニシティ・マネジメント</p>
  <p style="margin-top:6px">社内向けナレッジポータル</p>
</div>

</body>
</html>
