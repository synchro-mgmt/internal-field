<!DOCTYPE html>

<head>

<title>社外プロジェクト — Internal Field</title>
<link rel="icon" type="image/svg+xml" href="/internal-field/assets/favicon.svg">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Zen+Maru+Gothic:wght@400;700&display=swap');
  :root { --navy:#0a1628; --gold:#f0d9a8; --bg:#faf9f7; --card:#fff; --text:#1a1a2e; --text-sub:#64748b; --border:#e2e8f0; --external:#0891b2; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Noto Sans JP',-apple-system,sans-serif; background:var(--bg); color:var(--text); line-height:1.8; }
  .hero { background:linear-gradient(160deg,var(--navy),#1b2d4f); color:#fff; padding:56px 24px 64px; text-align:center; }
  .hero h1 { font-family:'Zen Maru Gothic',sans-serif; font-size:1.8em; letter-spacing:0.06em; }
  .hero p { opacity:0.6; font-size:0.9em; font-weight:300; max-width:480px; margin:0 auto; }
  .container { max-width:760px; margin:-32px auto 0; padding:0 20px 60px; }
  .proj-card { background:var(--card); border:1px solid var(--border); border-left:4px solid var(--external); border-radius:14px; padding:24px 28px; margin-bottom:16px; box-shadow:0 4px 16px rgba(10,22,40,0.06); }
  .proj-card h3 { font-family:'Zen Maru Gothic',sans-serif; font-size:1.1em; margin-bottom:6px; }
  .proj-card p { font-size:0.85em; color:var(--text-sub); }
  .status { display:inline-block; font-size:0.72em; font-weight:600; padding:2px 12px; border-radius:20px; background:rgba(8,145,178,0.1); color:#0e7490; margin-top:10px; }
</style>
</head>

<div class="hero">
  <h1>🌐 社外プロジェクト</h1>
  <p>共鳴ベースで関わる外部の場。堀内さんの仕組み化の力を外部の生態系へ届ける。</p>
</div>
<div class="container">
  <div class="proj-card">
    <h3>📖 神田昌典さん 新企画</h3>

    <span class="status">進行中 — 詳細ページ準備中</span>
  </div>
  <div class="proj-card">
    <h3>🙏 リンポチェ様 事務局</h3>

    <span class="status">進行中 — 詳細ページ準備中</span>
  </div>
</div>
</body>
</html>
